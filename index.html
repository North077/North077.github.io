<!DOCTYPE html>

<html lang="en">

  <head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link

      href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap"

      rel="stylesheet"

    />

    <link rel="stylesheet" href="css/index.css" />

    <script src="src/app.js" defer></script>

    <title>The post exam stress counter</title>

  </head>

  <body>

    <div id="P1-Container">

      <h1 class="content" id="wlcm">Welcome to,</h1>

      <h1 class="content" id="name">

        the POST-EXAM<br />

        STRESS<br />

        COUNTER<br />

      </h1>

      <p class="content" id="intro">

        It counts the time left before the exam starts and also probably makes

        you feel stressful. That's it :)

      </p>

      <p class="content" id="instruction">Swipe up to view counter</p>

    </div>

    <div id="P2-Container">

      <div id="time-stamp">

        <span id="cnt-days" class="count">10 days,</span><br />

        <span id="cnt-hours" class="count">14 hours,</span><br />

        <span id="cnt-mins" class="count">54 minutes,</span><br />

        <span class="count">and</span><br />

        <span id="cnt-secs" class="count">2 seconds</span>

      </div>

      <p id="motivation-instruction">I need motivation</p>

    </div>

    <div id="motivationPanel">

      don't give up, make mom proud.<br /><br />

      - Kiron -

    </div>

  </body>

</html>
